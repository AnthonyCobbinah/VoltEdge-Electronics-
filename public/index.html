<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltEdge Electronics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style> [x-cloak] { display: none !important; } .hardware-img { width: 100%; height: 160px; object-fit: contain; } </style>
</head>
<body class="bg-slate-50 font-sans" x-data="voltEdgeApp()" x-init="init()">

    <div x-show="toast.show" x-cloak class="fixed top-5 left-1/2 -translate-x-1/2 z-[200] bg-violet-600 text-white px-8 py-3 rounded-full shadow-2xl font-bold" x-text="toast.msg"></div>

    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black italic uppercase">VoltEdge</h1>
        <div class="flex gap-4 items-center">
            <template x-if="user"><button @click="logout()" class="text-[10px] text-red-400 font-bold">LOGOUT</button></template>
            <button @click="showAdminModal = true" class="text-[10px] bg-violet-600 px-3 py-1 rounded font-bold uppercase">Admin Panel</button>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8">
        <div x-show="!user" class="max-w-md mx-auto mt-12 bg-white p-8 rounded-[2rem] shadow-xl border">
            <div class="flex gap-4 mb-8">
                <button @click="authMode = 'login'" :class="authMode === 'login' ? 'text-violet-600 border-b-2 border-violet-600' : 'text-slate-300'" class="flex-1 pb-2 font-bold uppercase text-xs">Login</button>
                <button @click="authMode = 'register'" :class="authMode === 'register' ? 'text-violet-600 border-b-2 border-violet-600' : 'text-slate-300'" class="flex-1 pb-2 font-bold uppercase text-xs">Register</button>
            </div>
            <div class="space-y-4">
                <div x-show="authMode === 'register'">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Full Name (First & Last)</label>
                    <input type="text" x-model="authForm.name" placeholder="John Doe" class="w-full border-2 p-3 rounded-xl font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Phone (10 Digits)</label>
                    <input type="tel" x-model="authForm.phone" placeholder="0241234567" class="w-full border-2 p-3 rounded-xl font-bold">
                </div>
                <button @click="handleAuth()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase" x-text="authMode === 'register' ? 'Register Now' : 'Sign In'"></button>
            </div>
        </div>

        <div x-show="user && view === 'shop'" x-cloak class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
                <template x-for="item in products">
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm hover:shadow-lg transition-all text-center">
                        <img :src="item.image" class="hardware-img mb-4" :alt="item.name" onerror="this.src='https://placehold.co/200x160?text=Hardware+Missing'">
                        <h3 class="font-bold text-sm" x-text="item.name"></h3>
                        <p class="text-violet-600 font-black text-lg mb-4" x-text="'GH₵ ' + item.price"></p>
                        <button @click="placeOrder(item)" class="w-full bg-slate-900 text-white py-3 rounded-xl text-xs font-bold hover:bg-violet-600">ORDER NOW</button>
                    </div>
                </template>
            </div>
            <div class="lg:col-span-1 bg-white p-6 rounded-[2rem] border h-fit shadow-sm">
                <h2 class="font-bold text-xs uppercase border-b pb-2 mb-4">Tracking Orders</h2>
                <template x-for="o in myOrders">
                    <div class="p-3 mb-2 rounded bg-slate-50 border text-[10px]">
                        <p class="font-bold uppercase" x-text="o.itemName"></p>
                        <span class="font-black" :class="o.status === 'confirmed' ? 'text-green-600' : (o.status === 'out-of-stock' ? 'text-red-600' : 'text-amber-600')" x-text="o.status.toUpperCase()"></span>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'admin'" x-cloak class="max-w-6xl mx-auto bg-white rounded-[2rem] shadow-2xl border-4 border-violet-600 overflow-hidden">
            <div class="bg-violet-600 p-6 text-white flex justify-between items-center">
                <h2 class="text-2xl font-black italic uppercase">Admin Management</h2>
                <button @click="view = 'shop'" class="bg-white text-violet-600 px-4 py-1 rounded font-bold text-xs">EXIT</button>
            </div>
            <table class="w-full text-left">
                <tr class="bg-slate-100 text-[10px] font-bold uppercase">
                    <th class="p-4">Customer</th><th class="p-4">Item</th><th class="p-4">Action</th>
                </tr>
                <template x-for="o in allOrders">
                    <tr class="border-b">
                        <td class="p-4 font-bold text-sm" x-text="o.customerName + ' (' + o.customerPhone + ')'"></td>
                        <td class="p-4 font-bold text-xs" x-text="o.itemName"></td>
                        <td class="p-4 flex gap-1">
                            <button @click="updateStatus(o.id, 'confirmed')" class="bg-green-500 text-white px-2 py-1 rounded text-[8px] font-bold">CONFIRM</button>
                            <button @click="updateStatus(o.id, 'out-of-stock')" class="bg-orange-500 text-white px-2 py-1 rounded text-[8px] font-bold">NO STOCK</button>
                            <button @click="deleteOrder(o.id)" class="bg-red-600 text-white px-2 py-1 rounded text-[8px] font-bold">DELETE</button>
                        </td>
                    </tr>
                </template>
            </table>
        </div>
    </div>

    <div x-show="showAdminModal" x-cloak class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm text-center">
            <h3 class="font-bold mb-4 uppercase">Admin Key</h3>
            <input type="password" x-model="adminPassInput" class="w-full border-2 p-3 rounded-xl mb-4 text-center font-bold outline-none">
            <button @click="adminLogin()" class="w-full bg-violet-600 text-white py-3 rounded-xl font-bold">VERIFY</button>
        </div>
    </div>

    <script>
        function voltEdgeApp() {
            return {
                view: 'shop', authMode: 'login', user: null, authForm: {name: '', phone: ''}, showAdminModal: false, adminPassInput: '', myOrders: [], allOrders: [], toast: {show:false, msg:''},
                products: [
                    {name:'HP Pavilion 15 Motherboard', price:1100, image: 'HP-Pavilion-15.jpg'},
                    {name:'256GB SSD', price:250, image: 'ssd-256.jpg'},
                    {name:'512GB SSD', price:450, image: 'ssd-512.jpg'},
                    {name:'HP Envy laptop battery', price:380, image: 'HP-Envy-laptop-battery.jpg'},
                    {name:'1TB HDD', price:400, image: 'hdd-1tb.jpg'},
                    {name:'DIY Kit', price:290, image: 'diy-electronic-kit.jpg'},
                    {name:'Dell Vostro N411Z Battery', price:350, image: 'Dell Vostro N411Z battry.jpg'}
                ],
                init() {
                    const s = localStorage.getItem('voltEdgeSession');
                    if(s){this.user=JSON.parse(s); this.loadOrders();}
                    setInterval(()=>this.loadOrders(), 5000);
                },
                triggerToast(m) { this.toast.msg = m; this.toast.show = true; setTimeout(()=>this.toast.show=false,3000); },
                async handleAuth() {
                    const res = await fetch(`/api/${this.authMode}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(this.authForm) });
                    const data = await res.json();
                    if(res.ok) { this.user = data.user; localStorage.setItem('voltEdgeSession', JSON.stringify(this.user)); this.loadOrders(); } else alert(data.error);
                },
                async loadOrders() { 
                    if(!this.user) return; 
                    const res = await fetch(`/api/my-orders/${this.user.phone}`); 
                    if(res.ok) this.myOrders = await res.json(); 
                    if(this.view === 'admin') this.adminFetch(); 
                },
                async adminFetch() { 
                    const res = await fetch('/api/admin/verify', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({password: 'G1234'}) }); 
                    const data = await res.json(); 
                    if(data.success) this.allOrders = data.orders; 
                },
                async placeOrder(item) { 
                    await fetch('/api/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: this.user.phone, itemName: item.name, price: item.price}) }); 
                    this.loadOrders(); 
                    this.triggerToast("Order Placed Successfully!"); 
                },
                async updateStatus(id, status) { 
                    const res = await fetch(`/api/orders/${id}/status`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status}) }); 
                    if(res.ok) this.adminFetch();
                },
                async deleteOrder(id) { 
                    if(confirm("Permanently Delete?")) { 
                        const res = await fetch(`/api/orders/${id}`, {method:'DELETE'}); 
                        if(res.ok) this.adminFetch();
                    } 
                },
                adminLogin() { 
                    if(this.adminPassInput === 'G1234'){this.view='admin'; this.showAdminModal=false; this.adminFetch();} 
                    else alert("Wrong Key"); 
                },
                logout() { localStorage.removeItem('voltEdgeSession'); location.reload(); }
            }
        }
    </script>
</body>
</html>
